<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete your registration</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script>
        function checkForm(event) {
            var pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{12,}$/;
            var string = document.getElementById("password").value;
            var match = document.getElementById("confirm_password").value;
            if(string == ''){
                alert("Password is empty.");
                event.preventDefault(); // Prevent form submission
            }

            if(match == ''){
                alert("Confirm password is empty.");
                event.preventDefault(); // Prevent form submission
            }

            if (!pattern.test(string)) {
                alert("Password wasn't strong enough.");
                event.preventDefault(); // Prevent form submission
            }

            if (string !== match) {
                alert("Password confirmation failed. Please ensure both passwords are identical");
                event.preventDefault(); // Prevent form submission
                return;
            }
        }
    </script>
</head>

<body>
    <div class="container">
        <h2>Complete your registration</h2>
        <form action="create_ldap_user.php" method="POST" onsubmit="checkForm(event)">
            <div class="form-group">
                <label for="user">Username:</label>
                <input type="text" class="form-control" id="user" name="user" required value="[[username]]" readonly>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control" id="email" name="email" required value="[[email]]" readonly>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" class="form-control" id="password" name="password" required>
                <small id="passwordHelp" class="form-text text-muted">Your password must be at least 12 characters long
                    and include at least one uppercase letter, one lowercase letter, one number, and one special
                    character @$!%*?&</small>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
            <input type="hidden" id="token" name="token" required value="[[token]]">
            <button type="submit" class="btn btn-primary mt-3">Complete your registration</button>
        </form>
    </div>
</body>

</html>
